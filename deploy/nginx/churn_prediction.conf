# /etc/nginx/sites-available/churn_prediction
# Symlink into /etc/nginx/sites-enabled/ and reload nginx.
#
# Replace SERVER_NAME_PLACEHOLDER with your EC2 public DNS or DuckDNS name
# before enabling. Example:
#   ec2-13-233-xxx-xxx.ap-south-1.compute.amazonaws.com
#   yourname.duckdns.org

upstream churn_gunicorn {
    server unix:/run/gunicorn/churn.sock fail_timeout=0;
}

# Rate-limit the login endpoint to slow down brute force.
limit_req_zone $binary_remote_addr zone=login_zone:10m rate=5r/m;

server {
    listen 80;
    listen [::]:80;
    server_name SERVER_NAME_PLACEHOLDER;

    # Max upload size (CSV uploads for batch predictions, etc.).
    client_max_body_size 20M;

    # Security headers (Django sets most, these are belt-and-suspenders).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;

    # Don't leak nginx version.
    server_tokens off;

    # WhiteNoise serves /static/, but nginx can short-circuit for speed.
    location /static/ {
        alias /opt/churn_prediction/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias /opt/churn_prediction/media/;
        expires 7d;
        access_log off;
    }

    # Rate-limit login.
    location = /accounts/login/ {
        limit_req zone=login_zone burst=10 nodelay;
        proxy_pass http://churn_gunicorn;
        include /etc/nginx/proxy_params;
    }

    location / {
        proxy_pass http://churn_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 60s;
    }

    # Block noisy bots from hitting Django and filling logs.
    location ~* /(\.env|\.git|wp-admin|wp-login) {
        return 444;
    }
}

# After certbot runs it will add a second server block on 443 automatically
# and redirect 80 -> 443. No manual edit needed.
