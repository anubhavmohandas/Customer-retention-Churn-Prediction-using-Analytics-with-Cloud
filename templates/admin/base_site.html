{% extends "admin/base.html" %}
{% load static %}

{% block title %}{{ title }} | Retain.Ai Admin{% endblock %}

{% block branding %}
<h1 id="site-name">
  <a href="{% url 'admin:index' %}">
    <span style="font-weight:800;letter-spacing:-0.04em;">Retain</span><span style="font-weight:800;letter-spacing:-0.04em;">.</span><span style="font-weight:300;letter-spacing:-0.02em;">Ai</span>
    <span style="font-size:0.6rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;opacity:0.45;margin-left:10px;vertical-align:middle;border:1px solid rgba(255,255,255,0.25);padding:2px 7px;border-radius:4px;">Admin</span>
  </a>
</h1>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" type="text/css" href="{% static 'admin/css/custom_admin.css' %}">
<style>
  .retain-signout-btn {
    background: #e53e3e;
    color: #fff !important;
    padding: 3px 12px;
    border-radius: 5px;
    font-weight: 600;
    margin-left: 8px;
    border: none;
    cursor: pointer;
    font-size: 0.8125rem;
    font-family: inherit;
    text-decoration: none;
    vertical-align: middle;
  }
  .retain-signout-btn:hover {
    background: #c53030;
  }
</style>
{% endblock %}

{% block footer %}
{{ block.super }}
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var userTools = document.getElementById('user-tools');
    if (!userTools) return;

    // Get CSRF token from cookie
    var csrfToken = (document.cookie.match(/csrftoken=([^;]+)/) || [])[1] || '';

    // Build a POST form that acts as the Sign Out button
    var form = document.createElement('form');
    form.method = 'post';
    form.action = '/admin/logout/';
    form.style.display = 'inline';

    var csrf = document.createElement('input');
    csrf.type = 'hidden';
    csrf.name = 'csrfmiddlewaretoken';
    csrf.value = csrfToken;

    var btn = document.createElement('button');
    btn.type = 'submit';
    btn.textContent = 'Sign Out';
    btn.className = 'retain-signout-btn';

    form.appendChild(csrf);
    form.appendChild(btn);
    userTools.appendChild(form);
  });
</script>
{% endblock %}
