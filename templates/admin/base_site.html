{% extends "admin/base.html" %}
{% load static %}

{% block title %}{{ title }} | Retain.Ai Admin{% endblock %}

{% block branding %}
<h1 id="site-name">
  <a href="{% url 'admin:index' %}">
    <span style="font-weight:800;letter-spacing:-0.04em;">Retain</span><span style="font-weight:800;letter-spacing:-0.04em;">.</span><span style="font-weight:300;letter-spacing:-0.02em;">Ai</span>
    <span style="font-size:0.6rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;opacity:0.45;margin-left:10px;vertical-align:middle;border:1px solid rgba(255,255,255,0.25);padding:2px 7px;border-radius:4px;">Admin</span>
  </a>
</h1>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" type="text/css" href="{% static 'admin/css/custom_admin.css' %}">
<style>
  /* Style Django 6's built-in logout button */
  #logout-form {
    display: inline;
  }
  #logout-form button {
    background: #e53e3e;
    color: #fff;
    padding: 3px 12px;
    border-radius: 5px;
    font-weight: 600;
    margin-left: 8px;
    border: none;
    cursor: pointer;
    font-size: 0.8125rem;
    font-family: inherit;
  }
  #logout-form button:hover {
    background: #c53030;
  }
  /* Hide Django 6's theme toggle button */
  button.theme-toggle {
    display: none !important;
  }
</style>
{% endblock %}

{% block footer %}
{{ block.super }}
<script>
  // Rename "Log out" to "Sign Out"
  document.addEventListener('DOMContentLoaded', function () {
    var btn = document.querySelector('#logout-form button');
    if (btn) btn.textContent = 'Sign Out';
  });
</script>
{% endblock %}
