<header class="flex items-center justify-between px-6 py-4 bg-white dark:bg-[#0d0d0d] border-b border-gray-100 dark:border-zinc-800 sticky top-0 z-20">
    <!-- Mobile: logo + hamburger -->
    <div class="flex items-center gap-3 lg:hidden">
        <div class="w-8 h-8 bg-black dark:bg-white rounded-xl flex items-center justify-center rotate-3">
            <div class="w-3 h-3 bg-white dark:bg-black rounded-full"></div>
        </div>
        <span class="text-base font-extrabold tracking-tighter dark:text-white">RETAIN.AI</span>
    </div>
    <button onclick="openSidebar()" class="lg:hidden p-2 rounded-xl hover:bg-gray-100 dark:hover:bg-zinc-800 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 dark:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <!-- Desktop: spacer -->
    <div class="hidden lg:block"></div>

    <!-- User avatar dropdown (always visible) -->
    <div class="relative" id="userMenuContainer">
        <button id="userMenuBtn" class="flex items-center gap-2.5 px-3 py-2 rounded-2xl hover:bg-gray-100 dark:hover:bg-zinc-800 transition">
            <div class="w-8 h-8 bg-black dark:bg-white rounded-xl flex items-center justify-center font-black text-xs text-white dark:text-black flex-shrink-0">
                {{ request.user.first_name|slice:":1" }}{{ request.user.last_name|slice:":1" }}
            </div>
            <span class="text-sm font-bold dark:text-white hidden sm:block">{{ request.user.get_full_name|default:request.user.username }}</span>
            <svg class="w-3.5 h-3.5 text-gray-400 dark:text-zinc-500 hidden sm:block" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
        </button>

        <!-- Dropdown -->
        <div id="userDropdown" class="hidden absolute right-0 top-full mt-2 w-56 bg-white dark:bg-[#141414] border border-gray-100 dark:border-zinc-800 rounded-2xl shadow-xl shadow-black/5 dark:shadow-black/30 overflow-hidden z-50">
            <div class="px-4 py-3 border-b border-gray-100 dark:border-zinc-800">
                <p class="text-xs font-black dark:text-white truncate">{{ request.user.get_full_name|default:request.user.username }}</p>
                <p class="text-[10px] text-gray-400 dark:text-zinc-500 truncate mt-0.5">{{ request.user.email }}</p>
            </div>
            <div class="p-1.5">
                <a href="{% url 'settings_page' %}" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold text-gray-600 dark:text-zinc-300 hover:bg-gray-50 dark:hover:bg-zinc-800 transition">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>
                    Settings
                </a>
            </div>
            <div class="p-1.5 border-t border-gray-100 dark:border-zinc-800">
                <form method="POST" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold text-red-500 hover:bg-red-50 dark:hover:bg-red-950/30 transition">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                        Sign Out
                    </button>
                </form>
            </div>
        </div>
    </div>
</header>

<script>
    const userMenuBtn = document.getElementById('userMenuBtn');
    const userDropdown = document.getElementById('userDropdown');
    userMenuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        userDropdown.classList.toggle('hidden');
    });
    document.addEventListener('click', () => userDropdown.classList.add('hidden'));
    userDropdown.addEventListener('click', (e) => e.stopPropagation());
</script>
